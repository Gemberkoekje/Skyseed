distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-9.2.1-bin.zip
# Supply-chain hardening: pin the distribution checksum so the wrapper verifies the Gradle it downloads (not just
# the URL). Fetch the official value from https://services.gradle.org/distributions/gradle-9.2.1-bin.zip.sha256
# (or run `gradle wrapper --gradle-version 9.2.1 --gradle-distribution-sha256-sum <sum>`) and uncomment:
# distributionSha256Sum=<sha256 of gradle-9.2.1-bin.zip>
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
