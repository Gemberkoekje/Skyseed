plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
    id 'jacoco'
}

// --- Per-node version selection (Stonecutter Stage 2 — see REFACTORPLAN.md) ---
// This build script runs in the version NODE subproject, whose name is the MC version ("1.21.1" / "26.1.2"). Pull this
// node's MC / NeoForge / Java versions (and optional Parchment / Patchouli) from the version-keyed root gradle.properties.
def mcv = project.name
ext.minecraft_version       = property("mc_${mcv}")
ext.minecraft_version_range = property("mcrange_${mcv}")
ext.neo_version             = property("neo_${mcv}")
def javaVersion             = property("java_${mcv}") as int

// Prefix the Minecraft version so jars and the in-game version are distinguishable across MC versions once we
// target more than one (e.g. skyseed-1.21.1_0.60.0.jar). minecraft_version is per-node under Stonecutter.
version = "${minecraft_version}_${mod_version}"
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators. (rootProject paths: under Stonecutter the build script runs
    // in the per-version node project, but the source lives at the repo root — see REFACTORPLAN.md / settings.gradle.)
    srcDir(rootProject.file('src/generated/resources'))

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

// Each MC version gets its OWN gametest suite, fully isolated by package + a per-version compile exclude. The 1.21.5+
// rewrite removed the @GameTest / @GameTestHolder annotation API (it's now the GameTestInstance / RegisterGameTestsEvent
// framework), so the suites can't share source. Keeping them separate also means the 1.21.1 suite stays an UNCHANGING
// golden-master witness while newer nodes get a native suite. Add a node → add a `gametest_<v>` package + a branch here.
// See GAMETESTPLAN.md.
if (mcv == "1.21.1") {
    sourceSets.main.java {
        exclude("dev/gemberkoekje/skyseed/gametest_26_1_2/**") // 1.21.1 node: only the old-API suite
    }
} else {
    sourceSets.main.java {
        exclude("dev/gemberkoekje/skyseed/gametest/**")        // newer nodes: only their native suite
    }
}

// Stonecutter copies src/main into the per-version node, so processResources can see a resource from both the node
// copy and the repo-root source — byte-identical for a single version. Drop the duplicates. (When per-version
// directives exist (Stage 2), revisit so the processed copy wins — see REFACTORPLAN.md / Stonecutter resource processing.)
tasks.withType(ProcessResources).configureEach {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

// DevStructureGenerator writes its code-authored .nbt templates into the REPO-ROOT src (see the runs config below),
// but under Stonecutter processResources stages THIS version node's own copy (versions/<v>/src) and the EXCLUDE above
// keeps it. That node copy is only refreshed when Stonecutter re-chisels, so a freshly generated — or freshly pulled —
// structure template gets silently shadowed by a stale node copy (a footgun that cost real debugging time). Refresh
// the node's structure dir from the repo root before resources are processed, so a single `runClient` always sees the
// current templates with no manual wipe of versions/<v>/src.
if (project != rootProject) {
    def syncDevStructures = tasks.register('syncDevStructures', Copy) {
        from rootProject.file('src/main/resources/data/skyseed/structure')
        into project.file('src/main/resources/data/skyseed/structure')
    }
    tasks.withType(ProcessResources).configureEach { dependsOn(syncDevStructures) }
}

// --- Per-version recipe generation (golden source -> version-correct JSON). See RECIPEGENPLAN.md. ---
// Recipes are authored ONCE in the modern (26.1.2) string-ingredient form under the repo-root `recipes/` tree; this
// task emits the node's data JSON into build/generated/recipes. Modern nodes copy verbatim; the legacy 1.21.1 node
// downgrades each ingredient ("x"/"#tag" -> {"item":"x"}/{"tag":"x"}), since the 1.21.5+ ingredient formats are
// mutually exclusive and can't share one JSON. Golden lives OUTSIDE src/main (so it never ships raw); the generated
// dir is a resource srcDir. processResources depends on it.
def goldenRecipesDir = rootProject.file('recipes')
def generatedRecipesDir = layout.buildDirectory.dir('generated/recipes')

// Downgrade a modern ingredient node (string / "#tag" / list-of-choices / typed object) to the 1.21.1 object form.
def downgradeIngredient
downgradeIngredient = { node ->
    if (node instanceof String) {
        node.startsWith('#') ? [tag: node.substring(1)] : [item: node]
    } else if (node instanceof List) {
        node.collect { downgradeIngredient(it) }
    } else {
        node // a typed/custom ingredient object -> leave as-is
    }
}

def generateRecipes = tasks.register('generateRecipes') {
    inputs.dir(goldenRecipesDir).optional()
    outputs.dir(generatedRecipesDir)
    def legacy = (mcv == "1.21.1")
    doLast {
        def outRoot = generatedRecipesDir.get().asFile
        outRoot.deleteDir()
        if (!goldenRecipesDir.exists()) return
        goldenRecipesDir.eachFileRecurse { f ->
            if (f.isDirectory() || !f.name.endsWith('.json')) return
            def rel = goldenRecipesDir.toPath().relativize(f.toPath()).toString()
            def outFile = new File(outRoot, rel)
            outFile.parentFile.mkdirs()
            if (legacy) {
                def recipe = new groovy.json.JsonSlurper().parse(f)
                if (recipe.key instanceof Map) {
                    recipe.key = recipe.key.collectEntries { k, v -> [(k): downgradeIngredient(v)] }
                }
                if (recipe.ingredients instanceof List) {
                    recipe.ingredients = recipe.ingredients.collect { downgradeIngredient(it) }
                }
                outFile.text = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(recipe))
            } else {
                outFile.text = f.text // modern node: golden is already the correct form
            }
        }
    }
}
sourceSets.main.resources.srcDir(generatedRecipesDir)
tasks.withType(ProcessResources).configureEach { dependsOn(generateRecipes) }

repositories {
    // Add here additional repositories if required by some of the dependencies below.
    maven { url = "https://maven.blamejared.com" } // Patchouli (guide book)
    maven { url = "https://dl.cloudsmith.io/public/klikli-dev/mods/maven/" } // Modonomicon (guide book)
}

base {
    archivesName = mod_id
}

// Java target is per-node (1.21.1 → Java 21; 26.1.2 → Java 25). Mojang ships the matching JDK to end users.
java.toolchain.languageVersion = JavaLanguageVersion.of(javaVersion)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    // Parchment param-name mappings — only when published for this node's MC (omitted = Mojmap only, still compiles).
    if (project.hasProperty("parchment_${mcv}")) {
        parchment {
            mappingsVersion = property("parchment_${mcv}")
            minecraftVersion = property("parchment_mc_${mcv}")
        }
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', rootProject.file('src/generated/resources/').getAbsolutePath(), '--existing', rootProject.file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            // The dev structure generator (DevStructureGenerator) writes code-authored .nbt templates here. Point it
            // at the repo-root src so it works under Stonecutter (the run otherwise executes in the per-version node
            // and would write to that throwaway src copy).
            systemProperty 'skyseed.structureDir', rootProject.file('src/main/resources/data/skyseed/structure').getAbsolutePath()

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // Patchouli — OPTIONAL: it provides the rich illustrated guide book. We compile against it and load it in
    // dev for testing, but the published mod does not require it (without Patchouli the guide is a plain
    // vanilla written book). compileOnly + localRuntime = present here, not forced on dependents. Per-node: skipped
    // for a node with no published Patchouli build (then PatchouliCompat needs a //? directive — Stage 2 work).
    if (project.hasProperty("patchouli_${mcv}")) {
        compileOnly "vazkii.patchouli:Patchouli:${property("patchouli_${mcv}")}"
        localRuntime "vazkii.patchouli:Patchouli:${property("patchouli_${mcv}")}"
    }
    // Modonomicon — OPTIONAL, same compileOnly + localRuntime pattern. The PRIMARY guide backend on every node
    // (preferred over Patchouli — see MODONOMICONPLAN.md); published for both 1.21.1 and 26.1.2. transitive=false:
    // we only need its API to compile + the mod present at dev runtime, not its dependency graph.
    if (project.hasProperty("modonomicon_${mcv}")) {
        compileOnly("com.klikli_dev:modonomicon-${mcv}-neoforge:${property("modonomicon_${mcv}")}") { transitive = false }
        localRuntime("com.klikli_dev:modonomicon-${mcv}-neoforge:${property("modonomicon_${mcv}")}") { transitive = false }
    }
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : "${minecraft_version}_${mod_version}",
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from rootProject.file("src/main/templates")
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url = "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
    // Surface all compiler warnings. Deliberately NOT -Werror: warnings should stay visible as reminders,
    // not be turned into build failures that pressure people into suppressing them. See codereview.md (B1).
    options.compilerArgs += ['-Xlint:all']
    options.deprecation = true
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

// --- Test coverage ----------------------------------------------------------------------------------------
// There are no JUnit tests (the suite is NeoForge GameTests run on a real server, see SkyseedGameTests), so
// coverage is measured by attaching the JaCoCo agent to the gameTestServer run and reporting against our own
// classes. Run `./gradlew gameTestCoverage` → build/reports/jacoco/gameTestCoverage/html/index.html.
jacoco {
    toolVersion = '0.8.12'
}

// The gameTestServer run is a ModDevGradle run, not a JavaExec/Test task, so the JaCoCo task extension does
// not apply. Attach the agent as a JVM argument by hand (the :runtime classifier is the standalone agent jar).
configurations {
    jacocoAgentRuntime
}
dependencies {
    jacocoAgentRuntime "org.jacoco:org.jacoco.agent:0.8.12:runtime"
}
// JaCoCo 0.8.12 can't instrument Java 25 bytecode (class file major version 69), which the 26.1.2 node compiles to —
// it throws on every mod class and pollutes the run. Attach the agent only on the 1.21.1 node for now; 26.1.2 coverage
// tooling (a Java-25-capable JaCoCo or alternative) is tracked in GAMETESTPLAN.md.
if (mcv == "1.21.1") {
    neoForge.runs.named('gameTestServer').configure {
        def execFile = layout.buildDirectory.file('jacoco/gameTest.exec').get().asFile
        // includes= our packages only: avoids JaCoCo choking on Minecraft's huge Blocks/Items classes and keeps the
        // run fast — we only care about coverage of the mod's own code anyway.
        jvmArgument("-javaagent:${configurations.jacocoAgentRuntime.singleFile}=destfile=${execFile},append=false,includes=dev.gemberkoekje.skyseed.*")
    }
}

tasks.register('gameTestCoverage', JacocoReport) {
    group = 'verification'
    description = 'Runs the GameTest suite and reports JaCoCo coverage of the mod classes.'
    dependsOn 'runGameTestServer'
    executionData(layout.buildDirectory.file('jacoco/gameTest.exec'))
    sourceSets sourceSets.main
    reports {
        html.required = true
        xml.required = true
        csv.required = false
    }
}
